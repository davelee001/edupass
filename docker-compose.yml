version: '3.8'

services:
  # PostgreSQL Database
  database:
    image: postgres:14-alpine
    container_name: edupass-database
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-edupass}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/setup-database.sql:/docker-entrypoint-initdb.d/01-setup.sql:ro
      - ./scripts/phase1-migration.sql:/docker-entrypoint-initdb.d/02-phase1.sql:ro
      - ./scripts/phase2-migration.sql:/docker-entrypoint-initdb.d/03-phase2.sql:ro
      - ./scripts/phase3-migration.sql:/docker-entrypoint-initdb.d/04-phase3.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edupass-network

  # Backend API
  backend:
    build:
      context: ./backend
      target: production
    container_name: edupass-backend
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-edupass}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      STELLAR_NETWORK: ${STELLAR_NETWORK:-testnet}
      ISSUER_PUBLIC_KEY: ${ISSUER_PUBLIC_KEY}
      ISSUER_SECRET_KEY: ${ISSUER_SECRET_KEY}
      ASSET_CODE: ${ASSET_CODE:-EDUPASS}
      ASSET_LIMIT: ${ASSET_LIMIT:-1000000}
      SOROBAN_CONTRACT_ID: ${SOROBAN_CONTRACT_ID}
      SOROBAN_RPC_URL: ${SOROBAN_RPC_URL:-https://soroban-testnet.stellar.org}
      SOROBAN_NETWORK_PASSPHRASE: ${SOROBAN_NETWORK_PASSPHRASE:-Test SDF Network ; September 2015}
      HORIZON_URL_TESTNET: https://horizon-testnet.stellar.org
      HORIZON_URL_PUBLIC: https://horizon.stellar.org
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      API_VERSION: ${API_VERSION:-v1}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - edupass-network

  # Frontend Web App
  frontend:
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
    container_name: edupass-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - edupass-network

volumes:
  postgres_data:
    driver: local

networks:
  edupass-network:
    driver: bridge
